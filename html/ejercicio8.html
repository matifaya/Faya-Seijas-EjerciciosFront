<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 8 - Registro</title>
</head>
<body>

    <h1>Crear una cuenta</h1>

    <form>
        <div>
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresá tu nombre" required>
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label><br>
            <input type="text" id="apellido" name="apellido" placeholder="Ingresá tu apellido" required>
        </div>
        <br>
        <div>
            <label for="email">Correo electrónico:</label><br>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>
        <br>
        <div>
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" placeholder="Creá una contraseña" required>
        </div>
        <br>
        <div>
            <label for="confirmar">Confirmar contraseña:</label><br>
            <input type="password" id="confirmar" name="confirmar" placeholder="Repetí tu contraseña" required>
        </div>
        <br>
        <div>
            <button type="submit">Registrarse</button>
        </div>
    </form>

</body>
</html>
